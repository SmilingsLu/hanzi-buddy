<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HanziGo — Test Suite</title>
<style>
body{font-family:-apple-system,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#1e293b}
h1{color:#4f46e5}
.test-group{margin:20px 0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.test-group h3{background:#f8fafc;margin:0;padding:10px 16px;border-bottom:1px solid #e2e8f0;font-size:14px}
.test{padding:8px 16px;border-bottom:1px solid #f1f5f9;font-size:13px;display:flex;align-items:center;gap:8px}
.test:last-child{border-bottom:none}
.pass{color:#059669}
.fail{color:#ef4444;font-weight:600}
.pass::before{content:'✅ '}
.fail::before{content:'❌ '}
.summary{margin-top:24px;padding:16px;border-radius:8px;font-size:15px;font-weight:600}
.summary.all-pass{background:#dcfce7;color:#166534}
.summary.has-fail{background:#fef2f2;color:#991b1b}
#runBtn{padding:10px 24px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-bottom:20px}
#runBtn:hover{background:#3730a3}
iframe{width:100%;height:0;border:none;position:absolute;left:-9999px}
</style>
</head>
<body>
<h1>🧪 HanziGo Test Suite</h1>
<p>Automated tests to verify app functionality. Tests load the app in a hidden iframe.</p>
<button id="runBtn" onclick="runTests()">▶ Run All Tests</button>
<div id="results"><p style="color:#999">Click "Run All Tests" to start</p></div>

<!-- Hidden iframe loads the real app -->
<iframe id="appFrame" src="index.html"></iframe>

<script>
let tests = [];
let passed = 0;
let failed = 0;
let app; // reference to iframe's window

function describe(group, fn) { tests.push({ group, tests: [] }); fn(); }
function it(name, fn) {
  const group = tests[tests.length - 1];
  try { fn(); group.tests.push({ name, pass: true }); passed++; }
  catch (e) { group.tests.push({ name, pass: false, error: e.message }); failed++; }
}
function assert(cond, msg) { if (!cond) throw new Error(msg || 'Assertion failed'); }
function assertEqual(a, b, msg) { if (a !== b) throw new Error(msg || `Expected ${b}, got ${a}`); }
function assertGreater(a, min, msg) { if (a <= min) throw new Error(msg || `Expected > ${min}, got ${a}`); }

function renderResults() {
  let html = '';
  tests.forEach(group => {
    html += `<div class="test-group"><h3>${group.group}</h3>`;
    group.tests.forEach(t => {
      html += `<div class="test ${t.pass?'pass':'fail'}">${t.name}${t.error?' — '+t.error:''}</div>`;
    });
    html += '</div>';
  });
  html += `<div class="summary ${failed?'has-fail':'all-pass'}">${passed} passed, ${failed} failed (${passed+failed} total)</div>`;
  document.getElementById('results').innerHTML = html;
}

async function runTests() {
  tests = []; passed = 0; failed = 0;
  document.getElementById('results').innerHTML = '<p>Loading app in iframe...</p>';

  // Wait for iframe to load
  const frame = document.getElementById('appFrame');
  await new Promise(resolve => {
    if (frame.contentDocument.readyState === 'complete') resolve();
    else frame.onload = resolve;
  });

  // Wait for app to finish initializing (data loading is async)
  app = frame.contentWindow;
  for (let i = 0; i < 20; i++) {
    await new Promise(r => setTimeout(r, 500));
    try {
      if (app.State && app.State.get('allChars') && app.State.get('allChars').length > 0) break;
    } catch(e) {}
  }

  if (!app.State) {
    document.getElementById('results').innerHTML = '<p style="color:red">❌ Failed: app.State not accessible. Make sure test.html is served from the same origin (http://localhost:8080/test.html)</p>';
    return;
  }

  // === 1. Data Files ===
  describe('📂 Data Files', () => {
    it('allChars is loaded and non-empty', () => {
      const chars = app.State.get('allChars');
      assert(Array.isArray(chars), 'allChars should be array');
      assertGreater(chars.length, 100, `Only ${chars.length} chars loaded`);
    });

    it('Lessons loaded from multiple grades', () => {
      const lessons = app.State.get('lessons');
      assertGreater(lessons.length, 50, `Only ${lessons.length} lessons`);
    });

    it('Each char has required fields', () => {
      const chars = app.State.get('allChars');
      const sample = chars.slice(0, 50);
      sample.forEach(c => {
        assert(c.char && c.char.length === 1, `Bad char: ${c.char}`);
        assert(c.pinyin, `Missing pinyin for ${c.char}`);
        assert(c.words && c.words.length >= 1, `Missing words for ${c.char}`);
        assert(c.sentence, `Missing sentence for ${c.char}`);
      });
    });

    it('Chars contain the character in their sentence', () => {
      const chars = app.State.get('allChars');
      let missing = 0;
      chars.forEach(c => { if (!c.sentence.includes(c.char)) missing++; });
      assertEqual(missing, 0, `${missing} chars not in their sentence`);
    });
  });

  // === 2. HTML Structure ===
  describe('🏗️ HTML Structure', () => {
    const doc = frame.contentDocument;

    it('Critical learning elements exist', () => {
      const ids = ['flashcard', 'cardChar', 'favBtn', 'btnPrev', 'btnNext', 'btnFlip', 'btnSpeak', 'btnReinforce'];
      const missing = ids.filter(id => !doc.getElementById(id));
      assertEqual(missing.length, 0, `Missing: ${missing.join(', ')}`);
    });

    it('Critical challenge elements exist', () => {
      const ids = ['challengeMode', 'quizTypeSelector', 'quizOptions', 'btnPlayAgain'];
      const missing = ids.filter(id => !doc.getElementById(id));
      assertEqual(missing.length, 0, `Missing: ${missing.join(', ')}`);
    });

    it('Header elements exist', () => {
      const ids = ['streakNumber', 'btnProfile', 'btnFavorites', 'btnErrorBook', 'btnBadges'];
      const missing = ids.filter(id => !doc.getElementById(id));
      assertEqual(missing.length, 0, `Missing: ${missing.join(', ')}`);
    });

    it('Sidebar has grade items', () => {
      const items = doc.querySelectorAll('.sidebar-item[data-grade]');
      assertGreater(items.length, 10, `Only ${items.length} sidebar items`);
    });

    it('Mode tabs have data-mode', () => {
      const tabs = doc.querySelectorAll('.mode-tab[data-mode]');
      assertEqual(tabs.length, 2, 'Should have 2 mode tabs');
    });
  });

  // === 3. JS Modules ===
  describe('📦 JS Modules', () => {
    it('State module loaded', () => {
      assert(typeof app.State !== 'undefined');
      assert(typeof app.State.get === 'function');
      assert(typeof app.State.set === 'function');
      assert(typeof app.State.config === 'function');
    });

    it('DataService module loaded', () => {
      assert(typeof app.DataService !== 'undefined');
      assert(typeof app.DataService.generateQuizQuestions === 'function');
    });

    it('Speech module loaded', () => {
      assert(typeof app.Speech !== 'undefined');
      assert(typeof app.Speech.speak === 'function');
    });

    it('BadgeService has 5 badges', () => {
      assertEqual(app.BadgeService.getAll().length, 5, 'Should have 5 badges');
    });

    it('LearnController loaded', () => {
      assert(typeof app.LearnController.next === 'function');
      assert(typeof app.LearnController.prev === 'function');
      assert(typeof app.LearnController.flip === 'function');
      assert(typeof app.LearnController.reinforce === 'function');
    });

    it('ChallengeController loaded', () => {
      assert(typeof app.ChallengeController.start === 'function');
      assert(typeof app.ChallengeController.setType === 'function');
    });

    it('ProfileManager loaded', () => {
      assert(typeof app.ProfileManager !== 'undefined');
      assert(typeof app.ProfileManager.getProfiles === 'function');
    });
  });

  // === 4. Quiz Logic ===
  describe('🎮 Quiz Logic', () => {
    it('Generates pickPinyin questions', () => {
      const q = app.DataService.generateQuizQuestions(false, 'pickPinyin', 5);
      assert(q !== null, 'Should generate questions');
      assertGreater(q.length, 0, 'Should have questions');
      assertEqual(q[0].type, 'pickPinyin');
      assertEqual(q[0].options.length, 4, 'Should have 4 options');
    });

    it('Generates pickChar questions', () => {
      const q = app.DataService.generateQuizQuestions(false, 'pickChar', 5);
      assert(q !== null);
      assertEqual(q[0].type, 'pickChar');
    });

    it('Generates fillBlank questions', () => {
      const q = app.DataService.generateQuizQuestions(false, 'fillBlank', 5);
      assert(q !== null);
      // fillBlank may fall back to pickChar for some chars
      assert(q[0].type === 'fillBlank' || q[0].type === 'pickChar');
    });

    it('Generates mixed questions', () => {
      const q = app.DataService.generateQuizQuestions(false, 'mixed', 10);
      assert(q !== null);
      const types = new Set(q.map(x => x.type));
      assertGreater(types.size, 1, 'Mixed should have multiple types');
    });

    it('Correct answer is always in options', () => {
      const q = app.DataService.generateQuizQuestions(false, 'pickPinyin', 10);
      q.forEach(question => {
        assert(question.options.includes(question.target), 'Target must be in options');
      });
    });
  });

  // === 5. Badge System ===
  describe('🏆 Badge System', () => {
    it('All badges have required fields', () => {
      app.BadgeService.getAll().forEach(b => {
        assert(b.id, `Missing id`);
        assert(b.emoji, `${b.id} missing emoji`);
        assert(b.name, `${b.id} missing name`);
        assert(b.desc !== undefined, `${b.id} missing desc`);
        assert(typeof b.check === 'function', `${b.id} missing check`);
      });
    });

    it('Badge IDs are unique', () => {
      const ids = app.BadgeService.getAll().map(b => b.id);
      assertEqual(ids.length, new Set(ids).size, 'Duplicate badge IDs');
    });

    it('checkAndAward returns array', () => {
      const result = app.BadgeService.checkAndAward();
      assert(Array.isArray(result), 'Should return array');
    });
  });

  // === 6. Profile System ===
  describe('👤 Profiles', () => {
    it('At least one profile exists', () => {
      assertGreater(app.ProfileManager.getProfiles().length, 0, 'No profiles');
    });

    it('Profile has id, name, avatar', () => {
      const p = app.ProfileManager.getProfiles()[0];
      assert(p.id, 'Missing id');
      assert(p.name, 'Missing name');
      assert(p.avatar, 'Missing avatar');
    });

    it('State has active profile', () => {
      const id = app.State.getProfileId();
      assert(id && id.length > 0, 'No active profile ID');
    });
  });

  // === 7. Streak Logic ===
  describe('🔥 Streak', () => {
    it('Stats has consecutiveDays field', () => {
      const stats = app.State.get('stats');
      assert(stats.consecutiveDays !== undefined, 'Missing consecutiveDays');
    });

    it('Streak display shows a number', () => {
      const el = frame.contentDocument.getElementById('streakNumber');
      assert(el, 'streakNumber element missing');
      const num = parseInt(el.textContent);
      assert(!isNaN(num), `Streak should be a number, got: ${el.textContent}`);
    });
  });

  // === 8. Timer ===
  describe('⏱️ Timer', () => {
    it('Timer select element exists', () => {
      const el = frame.contentDocument.getElementById('quizTimerSelect');
      assert(el, 'quizTimerSelect not found');
    });

    it('Timer bar element exists', () => {
      const el = frame.contentDocument.getElementById('quizTimerBar');
      assert(el, 'quizTimerBar not found');
    });

    it('Timer bar has pointer-events:none', () => {
      const el = frame.contentDocument.getElementById('quizTimerBar');
      const style = frame.contentWindow.getComputedStyle(el);
      assertEqual(style.pointerEvents, 'none', 'Timer bar should not block clicks');
    });

    it('setTimer function exists', () => {
      assert(typeof app.ChallengeController.setTimer === 'function');
    });

    it('Timer options are 0, 5, 10, 15', () => {
      const el = frame.contentDocument.getElementById('quizTimerSelect');
      const values = Array.from(el.options).map(o => o.value);
      assert(values.includes('0'), 'Missing 0 (off)');
      assert(values.includes('5'), 'Missing 5');
      assert(values.includes('10'), 'Missing 10');
      assert(values.includes('15'), 'Missing 15');
    });
  });

  // === 9. Spaced Repetition (智能复习) ===
  describe('📈 Spaced Repetition', () => {
    it('SpacedRepService module exists', () => {
      assert(typeof app.SpacedRepService !== 'undefined', 'SpacedRepService not defined');
      assert(typeof app.SpacedRepService.recordAnswer === 'function', 'recordAnswer missing');
      assert(typeof app.SpacedRepService.getDueChars === 'function', 'getDueChars missing');
      assert(typeof app.SpacedRepService.getDueCount === 'function', 'getDueCount missing');
      assert(typeof app.SpacedRepService.getTotalCount === 'function', 'getTotalCount missing');
      assert(typeof app.SpacedRepService.getStats === 'function', 'getStats missing');
    });

    it('recordAnswer adds character to system', () => {
      const beforeCount = app.SpacedRepService.getTotalCount();
      app.SpacedRepService.recordAnswer('测', true);
      const afterCount = app.SpacedRepService.getTotalCount();
      assertGreater(afterCount, beforeCount - 1, 'Should have added char');
    });

    it('Wrong answer puts char in Box 1 (due today)', () => {
      app.SpacedRepService.recordAnswer('验', false);
      const due = app.SpacedRepService.getDueChars();
      assert(due.includes('验'), 'Wrong answer char should be due immediately');
    });

    it('Correct answer moves char to Box 2 (not due today)', () => {
      // First encounter then correct
      app.SpacedRepService.recordAnswer('试', true);
      const due = app.SpacedRepService.getDueChars();
      assert(!due.includes('试'), 'Correct answer char should NOT be due today (due tomorrow)');
    });

    it('getStats returns box distribution', () => {
      const stats = app.SpacedRepService.getStats();
      assert(stats.box1 !== undefined, 'Missing box1');
      assert(stats.box2 !== undefined, 'Missing box2');
      assert(stats.box3 !== undefined, 'Missing box3');
      assert(stats.box4 !== undefined, 'Missing box4');
      assert(stats.box5 !== undefined, 'Missing box5');
    });

    it('srsSideCount element exists', () => {
      const el = frame.contentDocument.getElementById('srsSideCount');
      assert(el, 'srsSideCount not found in DOM');
    });

    it('Sidebar has 智能复习 item', () => {
      const item = frame.contentDocument.querySelector('[data-grade="srs"]');
      assert(item, 'Sidebar item with data-grade="srs" not found');
    });
  });

  // === 10. Config ===
  describe('⚙️ Config', () => {
    it('Config returns defaults for missing keys', () => {
      assertEqual(app.State.config('fake.key', 42), 42);
    });

    it('Config reads speech.rate', () => {
      const rate = app.State.config('speech.rate', 0.8);
      assert(typeof rate === 'number', 'speech.rate should be number');
    });
  });

  renderResults();
}
</script>
</body>
</html>
